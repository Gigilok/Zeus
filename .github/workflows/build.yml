name: Build Crazy Cat Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware
        run: pio run

      - name: Copy boot_app0.bin to build dir
        run: |
          # Encontrar o boot_app0.bin no framework ESP32
          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32 -name "boot_app0.bin" | head -1)
          if [ -f "$BOOT_APP0" ]; then
            cp "$BOOT_APP0" .pio/build/esp32dev/boot_app0.bin
            echo "Copiado boot_app0.bin de: $BOOT_APP0"
          else
            echo "ERRO: boot_app0.bin não encontrado!"
            find ~/.platformio/packages/framework-arduinoespressif32 -name "*.bin" | head -20
            exit 1
          fi

      - name: List Build Files
        run: |
          echo "=== Arquivos gerados ==="
          ls -la .pio/build/esp32dev/*.bin
          echo ""
          echo "=== Tamanhos ==="
          du -h .pio/build/esp32dev/*.bin
          echo ""
          echo "=== Endereços de flash ==="
          echo "0x1000  -> bootloader.bin"
          echo "0x8000  -> partitions.bin"
          echo "0xe000  -> boot_app0.bin"
          echo "0x10000 -> firmware.bin"

      - name: Upload All Firmware Files
        uses: actions/upload-artifact@v4
        with:
          name: crazy-cat-firmware
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/bootloader.bin
            .pio/build/esp32dev/partitions.bin
            .pio/build/esp32dev/boot_app0.bin
          if-no-files-found: error
          
